# yeginbay palette — single source of truth.
# Consumed by: the Python package (figures) and generate_css.py (website).
# Edit colors HERE and nowhere else.

[neutral]
ink        = "#1a1a2e"   # foreground / darkest
paper      = "#fffff8"   # background
gray       = "#6e6e6e"   # secondary text, rules, mid-value fills
gray_light = "#dcd7e0"   # recessive fills (faintly mauve-tinted)

[accent]
primary = "#8a6aa8"   # dusty mauve — the "look here" color

# Categorical sequence for charts needing N distinguishable colors.
# Leads with ink + mauve (so 1-2 category charts stay on-brand), then
# falls back to Bang Wong's colorblind-safe palette.
[categorical]
colors = [
  "#1a1a2e",  # ink
  "#8a6aa8",  # mauve
  "#56b4e9",  # sky blue
  "#009e73",  # bluish green
  "#e69f00",  # orange
  "#cc79a7",  # reddish purple
  "#0072b2",  # blue
  "#d55e00",  # vermillion
]

# Dark-mode neutrals (matches the website's prefers-color-scheme: dark block).
# Figures don't use these yet, but the website CSS generator does.
[neutral_dark]
ink        = "#e8e8ec"
paper      = "#161616"
gray       = "#9d9d9d"
gray_light = "#3a3340"
